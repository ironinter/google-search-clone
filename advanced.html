<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Search</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="google" style="font-size: 24px; display: inline-block;"><div style="text-align: left;"><span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span></div></div>
        <a href="index.html">Google</a>
        <a href="imagesearch.html">Images</a>
    </header>

    <main>
        <div class="adv-title">Advanced Search</div>
        <hr>

        <form class="adv-form" action="https://www.google.com/search">
            <h3 style="font-weight: 500;"">Find pages with...</h3>
            <div class="adv-inputs">
                <label for="1">all these words:</label>
                <input type="text" name="as_q" id="1">
            </div>
            <div class="adv-inputs">
                <label for="2">this exact word or phrase:</label>
                <input type="text" name="as_epq" id="2">
            </div>
            <div class="adv-inputs">
                <label for="3">any of these words:</label>
                <input type="text" name="as_oq" id="3">
            </div>
            <div class="adv-inputs">
                <label for="4">none of these words:</label>
                <input type="text" name="as_eq" id="4">
            </div>

            <input class="adv-search-btn" type="submit" value="Advanced Search">
        </form>
    </main>

    <footer>
        <div class="footer-left">
            <a>Advertising</a>
            <a>Business</a>
            <a>How Search works</a>
        </div>
        <div class="footer-right">
            <a>Privacy</a>
            <a>Terms</a>
        </div>
    </footer>
</body>
</html>
